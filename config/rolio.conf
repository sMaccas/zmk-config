# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_KEYBOARD_NAME="Rolio46.2"

# Set deep sleep to 30 minutes
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_EXT_POWER=y

# Enable soft off
CONFIG_ZMK_PM_SOFT_OFF=y

# Lower the "press" debounce and keep the default value for the release.
# Default value for both options is 5
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Improves compatibility with iPad
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

# Boost Bluetooth TX power, also make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Diagnostic: EXPERIMENTAL_CONN temporarily disabled while investigating
# intermittent freezes. HW_STACK_PROTECTION ruled out stack overflow,
# disabling EXPERIMENTAL_FEATURES did not help, and dropping TX power to
# 0 dBm made BLE reconnect noticeably slower while still not stopping the
# freezes (and additionally caused the peripheral half to wedge alongside
# the central). EXPERIMENTAL_CONN is the last experimental BLE flag left on.
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Explicit BLE connection-parameter preferences to claw back the power
# savings that CONFIG_ZMK_BLE_EXPERIMENTAL_CONN used to provide. With
# the experimental flag off, the central runs on Zephyr defaults
# (interval 30..50 ms, slave latency 0) which keeps the radio busy on
# every interval and explains the asymmetric battery drain (37% on
# central vs 68% on peripheral after one session).
#
# The interval range matches what EXPERIMENTAL_CONN used to request
# (7.5..30 ms), which the macOS BLE stack happily honoured for the
# same hardware - reusing that range avoids re-introducing typing
# latency for the user while still allowing the peripheral to skip
# up to 30 intervals when idle. Pressed keys still report in the
# next interval so there is no extra typing latency from LATENCY.
#
# Timeout is sized to comfortably outlast the worst-case skipped
# window: (1 + LATENCY) * 2 * MAX_INT = 31 * 2 * 30 ms = 1.86 s,
# so 4 s leaves wide margin for radio retries.
#
# Apple HID guideline window: MIN_INT >= 12 (15 ms), MAX_INT <= 24
# (30 ms). We set MIN_INT=6 anyway because EXPERIMENTAL_CONN did
# the same and macOS accepted it in practice; if the host rejects
# the update request we still get the host's defaults (no harm).
#
#   units: MIN_INT / MAX_INT are 1.25 ms; TIMEOUT is 10 ms.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Enable split battery reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Fancy bluetooth features
# Diagnostic: EXPERIMENTAL_FEATURES temporarily disabled while investigating
# intermittent freezes that require a manual reset. HW_STACK_PROTECTION proved
# overflow is not the cause; this flag is the next-most-likely suspect.
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Setup the Backlight
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=5
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y
CONFIG_ZMK_BACKLIGHT_ON_START=n
CONFIG_ZMK_BACKLIGHT_BRT_STEP=5

# Use the Vista508 widgets rather than the built ins
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# Invert widget colors (black background, white foreground; bitmap
# images get their indexed palette flipped to match)
CONFIG_VISTA508_WIDGET_INVERTED=n

# LVGL 9's layer/draw call chain on the three 144x144 canvases uses
# more stack than the dedicated display thread's default. 16 KiB gives
# the draw path headroom and pre-emptively removes "stack overflow in
# display thread" as a candidate cause for the remaining intermittent
# freezes - with 256 KiB SRAM and BLE+canvases dominating the budget,
# 8 KiB of extra headroom is comfortable (~3% of total RAM).
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=16384

# Diagnostic: catch silent stack overflows.
#   HW_STACK_PROTECTION = MPU guard page below each thread stack; an overflow
#                         triggers a CPU fault.
#   STACK_SENTINEL      = software canary checked on every context switch;
#                         backup detector for non-MPU code paths.
# Without these, an overflow corrupts memory adjacent to BLE/display state and
# the only symptom is "keyboard wedged until manual reset". With them, the
# fault path runs CONFIG_RESET_ON_FATAL_ERROR (=y by default on nRF52840) and
# the device soft-resets in <1s, visible as Sharp Memory displays clearing
# and redrawing plus an automatic BLE reconnect.
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y

CONFIG_ZMK_POINTING=y
