# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_KEYBOARD_NAME="Rolio46.2"

# Set deep sleep to 30 minutes
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_EXT_POWER=y

# Enable soft off
CONFIG_ZMK_PM_SOFT_OFF=y

# Lower the "press" debounce and keep the default value for the release.
# Default value for both options is 5
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Improves compatibility with iPad
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y

# Boost Bluetooth TX power, also make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable split battery reporting
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Fancy bluetooth features
# Diagnostic: EXPERIMENTAL_FEATURES temporarily disabled while investigating
# intermittent freezes that require a manual reset. HW_STACK_PROTECTION proved
# overflow is not the cause; this flag is the next-most-likely suspect.
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Setup the Backlight
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=5
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y
CONFIG_ZMK_BACKLIGHT_ON_START=n
CONFIG_ZMK_BACKLIGHT_BRT_STEP=5

# Use the Vista508 widgets rather than the built ins
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# Invert widget colors (black background, white foreground; bitmap
# images get their indexed palette flipped to match)
CONFIG_VISTA508_WIDGET_INVERTED=n

# LVGL 9's layer/draw call chain on the three 144x144 canvases uses
# more stack than the dedicated display thread's default. Quadruple
# it to give the draw path headroom.
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# Diagnostic: catch silent stack overflows.
#   HW_STACK_PROTECTION = MPU guard page below each thread stack; an overflow
#                         triggers a CPU fault.
#   STACK_SENTINEL      = software canary checked on every context switch;
#                         backup detector for non-MPU code paths.
# Without these, an overflow corrupts memory adjacent to BLE/display state and
# the only symptom is "keyboard wedged until manual reset". With them, the
# fault path runs CONFIG_RESET_ON_FATAL_ERROR (=y by default on nRF52840) and
# the device soft-resets in <1s, visible as Sharp Memory displays clearing
# and redrawing plus an automatic BLE reconnect.
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y

CONFIG_ZMK_POINTING=y
